<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Highsail Signature Generator</title>
    <meta
      name="description"
      content="Create a branded Highsail email signature in seconds."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" href="assets/highsail-logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Highsail Signature Generator</h1>
      <p class="subtitle">Enter your details</p>

      <section class="form-section" aria-labelledby="form-heading">
        <h2 id="form-heading" class="visually-hidden">Your details</h2>

        <div class="form-grid">
          <label for="name">Name:</label>
          <input type="text" id="name" value="Jane Doe" autocomplete="name" />

          <label for="title">Title:</label>
          <input type="text" id="title" value="Customer Success" autocomplete="organization-title" />

          <label for="phone">Mobile Phone:</label>
          <input type="tel" id="phone" value="+32 470 00 00 00" autocomplete="tel" />

          <label for="email">Email Address:</label>
          <input type="email" id="email" value="jane@highsail.com" autocomplete="email" />

          <label for="profile-pic-input">Profile Picture:</label>
          <div class="profile-pic-cell">
            <input type="file" id="profile-pic-input" accept="image/*" />
            <button type="button" id="choose-picture">Choose Picture</button>
            <span class="profile-pic-hint">Optional — embedded in signature</span>
          </div>

          <label for="linkedinUrl">LinkedIn URL:</label>
          <input
            type="url"
            id="linkedinUrl"
            value="https://www.linkedin.com/company/highsail/"
            placeholder="Optional: full LinkedIn URL"
          />

          <label for="githubUrl">GitHub URL:</label>
          <input
            type="url"
            id="githubUrl"
            value=""
            placeholder="Optional: full GitHub profile URL"
          />

          <label for="meetingUrl">Meeting Link:</label>
          <input
            type="url"
            id="meetingUrl"
            value=""
            placeholder="Optional scheduling link"
          />
        </div>
      </section>

      <section class="preview-section" aria-labelledby="preview-heading">
        <h2 id="preview-heading">Preview</h2>
        <div class="signature-preview-wrap">
          <div id="signature-preview" class="signature-container"></div>
        </div>

        <div class="copy-button-wrapper">
          <button type="button" id="copy-button">Copy Signature</button>
        </div>
      </section>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="js/app.js"></script>
  </body>
</html>
